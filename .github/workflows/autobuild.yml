name: Rust Build/Test/Bundle

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
    
    - name: Install libs
      run: sudo apt-get -y update && sudo apt install -y freeglut3-dev libxcursor-dev libgtk-3-dev libxcb-icccm4-dev libx11-xcb-dev libxcb-dri2-0-dev libasound2-dev libjack-dev
    
    - name: Build
      run: cargo build --verbose
      
    - name: Run tests
      run: cargo test --verbose
  
  bundle:
    strategy:
      fail-fast: false
      matrix:
        os: 
          - ubuntu-latest
          - windows-latest
#           - macos-latest # pxtone-sys doesn't work on mac yet
        include:
          - os: ubuntu-latest
            name: linux
            xtask: bundle
          - os: windows-latest
            name: win
            xtask: bundle
#           - os: macos-latest # pxtone-sys doesn't work on mac yet
#             name: macos
#             xtask: bundle-universal
            
    runs-on: ${{ matrix.os }}
    needs: build
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: benjlevesque/short-sha@599815c8ee942a9616c92bcfb4f947a3b670ab0b # v3.0
      id: short-sha
    - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
      
    - name: Install libs
      if: matrix.name == 'linux'
      run: sudo apt-get -y update && sudo apt install -y freeglut3-dev libxcursor-dev libgtk-3-dev libxcb-icccm4-dev libx11-xcb-dev libxcb-dri2-0-dev libasound2-dev libjack-dev
      
    - name: Bundle
      run: cargo xtask ${{ matrix.xtask }} pxtone-plug --release
      
    - name: Upload a Build Artifact
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
      with:
        name: "pxtone-plug-${{ matrix.name }}-${{ steps.short-sha.outputs.sha }}"
        path: target/bundled/
